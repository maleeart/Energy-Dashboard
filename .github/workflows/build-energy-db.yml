name: Build Energy DB

on:
  push:
    paths:
      - "forms/*.csv"
      - "data/meter_master.csv"
      - "data/department_allocations.csv"
      - "scripts/*.py"
      - "index.html"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build generated database
        run: python scripts/build_energy_db.py

      - name: Commit generated outputs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-build energy database"
          file_pattern: data/weekly_readings.csv data/energy_db.json data/validation_report.json
